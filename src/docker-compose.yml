x-airflow-common: &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
    args:
      AIRFLOW_BASE_IMAGE: ${AIRFLOW_IMAGE_NAME:-apache/airflow:2.9.3-python3.11}
  env_file:
    - ./airflow/.env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session

    _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USER:-admin}
    _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
    _AIRFLOW_WWW_USER_FIRSTNAME: Airflow
    _AIRFLOW_WWW_USER_LASTNAME: Admin
    _AIRFLOW_WWW_USER_EMAIL: admin@example.com

    PYTHONPATH: /opt/airflow
    QDRANT_URL: http://hr-qdrant:6333

  volumes:
    - ./airflow:/opt/airflow
    - ./airflow/scripts:/scripts

  networks:
    - monitoring


services:

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

    networks:
      - monitoring

  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

    networks:
      - monitoring      


  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml
    ports:
      - "4317:4317"   
      - "4318:4318"   
      - "8888:8888"   
    networks:
      - monitoring


  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - monitoring


  hr-matcher:
    build: ./service
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./service/.env
    volumes:
      - ./models:/models
    command: ["python3", "main.py"]
    depends_on:
      - qdrant
      - redis
      - otel-collector
    networks:
      - monitoring


  celery-worker:
    build: ./service
    restart: unless-stopped
    env_file:
      - ./service/.env
    volumes:
      - ./models:/models
    command: ["celery", "-A", "worker.celery", "worker", "--loglevel=info"]
    depends_on:
      - redis
      - qdrant
      - hr-matcher
    networks:
      - monitoring


  db:
    image: postgres:15
    container_name: hr-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hr_matcher
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - monitoring


  qdrant:
    image: qdrant/qdrant:latest
    container_name: hr-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - monitoring


  airflow-db:
    image: postgres:15
    container_name: airflow-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow && sleep 2"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - monitoring


  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    depends_on:
      airflow-db:
        condition: service_healthy
    entrypoint: /bin/bash
    command: -c "bash /scripts/airflow-init.sh"
    restart: "no"


  airflow-web:
    <<: *airflow-common
    container_name: airflow-web
    depends_on:
      - airflow-init
    ports:
      - "9080:8080"
    command: airflow webserver


  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
    command: airflow scheduler


  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - ./airflow/.env
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - monitoring


  minio-init:
    image: minio/mc
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy      
    env_file:
      - ./airflow/.env
    volumes:
      - ./minio-seed:/data
    networks:
      - monitoring
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/dataset;
      mc cp --recursive /data/* local/dataset/$$RUN_ID/;
      echo 'Done seeding MinIO';
      "


volumes:
  pgdata:
  airflow_pgdata:
  minio_data:
  qdrant_data:


networks:
  monitoring:
    driver: bridge